<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔方求解器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #ff6fd8, #3813c2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .container { max-width: 1500px; margin: 0 auto; }

  .input-section {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .input-section label { font-size: 16px; font-weight: 600; display: block; margin-bottom: 10px; }
  .input-section textarea {
    width: 100%;
    height: 160px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #e0e0e0;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
  }
  .input-section textarea:focus { outline: none; border-color: #7c5cfc; }
  .btn-row { margin-top: 14px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #c165dd); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,92,252,0.4); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }

  .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 800px) { .output-grid { grid-template-columns: 1fr; } }
  .panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
  }
  .panel h2 { font-size: 17px; margin-bottom: 14px; color: #c9b8ff; }
  #answer-box {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 16px;
    font-size: 18px;
    line-height: 1.8;
    min-height: 80px;
    white-space: pre-wrap;
  }
  #steps-box {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.9;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  #steps-box .step-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  #steps-box .step-item:last-child { border-bottom: none; }

  .anim-section {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .anim-section h2 { font-size: 17px; margin-bottom: 14px; color: #c9b8ff; }
  .anim-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .anim-controls .btn { padding: 8px 20px; font-size: 14px; }
  .step-indicator { font-size: 14px; color: #aaa; margin-left: 8px; }

  /* Horizontal layout for 3D + 2D */
  .anim-display {
    display: flex;
    gap: 200px;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
  }

  /* 2D unfolded cube */
  .cube-display { display: flex; justify-content: center; }
  .cube-net {
    display: grid;
    grid-template-columns: repeat(4, auto);
    grid-template-rows: repeat(3, auto);
    gap: 4px;
    justify-items: center;
    align-items: center;
  }
  .face-block {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    position: relative;
  }
  .face-wrapper { text-align: center; }
  .face-wrapper .face-label {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
    letter-spacing: 1px;
  }
  .face-wrapper .face-label .face-letter {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 13px;
  }
  .cell {
    width: 34px;
    height: 34px;
    border-radius: 4px;
    border: 1.5px solid rgba(0,0,0,0.5);
    transition: background 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(0,0,0,0.3);
    font-weight: 600;
  }
  .cell.highlight {
    box-shadow: 0 0 0 2px #ffd740, 0 0 12px rgba(255,215,64,0.5);
  }
  .empty-cell { width: 110px; height: 110px; }

  .c-blue    { background: #0051ba; }
  .c-yellow  { background: #ffd500; }
  .c-red     { background: #c41e3a; }
  .c-green   { background: #009e60; }
  .c-orange  { background: #ff5800; }
  .c-white   { background: #ffffff; }

  /* 3D Cube */
  .cube3d-wrapper { text-align: center; flex-shrink: 0; }
  .cube3d-wrapper .face-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #aaa; }
  .cube3d-container {
    perspective: 600px;
    width: 220px;
    height: 220px;
    margin: 0 auto;
  }
  .cube3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-25deg) rotateY(35deg);
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .rotation-arrow {
    font-size: 48px;
    line-height: 1;
    text-align: center;
    margin-top: 8px;
    color: #ffd740;
    transition: opacity 0.3s;
    min-height: 56px;
  }
  .rotation-arrow .arrow-label {
    font-size: 13px;
    color: #aaa;
    margin-top: 2px;
  }

  /* Active face highlight in 3D */
  .face3d.face-active {
    box-shadow: 0 0 30px 10px rgba(255, 215, 64, 0.6), inset 0 0 20px rgba(255, 215, 64, 0.15);
    z-index: 10;
  }
  .face3d.face-active .cell3d {
    border-color: rgba(255, 215, 64, 0.7) !important;
  }

  /* Active face highlight in 2D */
  .face-wrapper.face-2d-active .face-block {
    box-shadow: 0 0 20px 6px rgba(255, 215, 64, 0.5);
    border-radius: 6px;
  }
  .face-wrapper.face-2d-active .face-label {
    color: #ffd740 !important;
    text-shadow: 0 0 10px rgba(255, 215, 64, 0.6);
  }

  /* Rotation indicator overlay */
  .rotation-indicator {
    text-align: center;
    margin-top: 12px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .rotation-indicator .arrow-symbol {
    font-size: 42px;
    color: #ffd740;
    text-shadow: 0 0 12px rgba(255, 215, 64, 0.5);
    animation: pulse-arrow 1.2s ease-in-out infinite;
  }
  .rotation-indicator .arrow-text {
    font-size: 14px;
    color: #ccc;
    margin-top: 4px;
  }
  @keyframes pulse-arrow {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.1); }
  }
  .cube3d .face3d {
    position: absolute;
    width: 220px;
    height: 220px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
    backface-visibility: visible;
  }
  .cube3d .face3d .cell3d {
    border-radius: 4px;
    border: 1.5px solid rgba(0,0,0,0.4);
  }
  .face3d-F { transform: translateZ(110px); }
  .face3d-B { transform: rotateY(180deg) translateZ(110px); }
  .face3d-U { transform: rotateX(90deg) translateZ(110px); }
  .face3d-D { transform: rotateX(-90deg) translateZ(110px); }
  .face3d-R { transform: rotateY(90deg) translateZ(110px); }
  .face3d-L { transform: rotateY(-90deg) translateZ(110px); }
  /* 3D face labels */
  .face3d-label {
    position: absolute;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 800;
    color: rgba(0,0,0,0.15);
    pointer-events: none;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #7c5cfc, #c165dd);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .notation-hint {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #aaa;
    margin-top: 10px;
    line-height: 1.8;
  }
  .notation-hint b { color: #c9b8ff; }
</style>
</head>
<body>
<div class="container">
  <h1>🧩 三阶魔方求解器</h1>

  <div class="input-section">
    <label>📝 输入魔方题目描述</label>
    <textarea id="queryInput" placeholder="示例：现在你手上有一个三阶魔方，正面F是蓝，左面L是黄，右面R是红，背面B是绿，顶面U是橙，底面D是白。
现在按以下步骤操作魔方：U，D2，U，L2，B。
现在魔方F面9个方块的颜色分别是什么？">现在你手上有一个三阶魔方，正面F是蓝，左面L是黄，右面R是红，背面B是绿，顶面U是橙，底面D是白。
现在按以下步骤操作魔方：U，D2，U，L2，B。
现在魔方F面9个方块的颜色分别是什么，按从左到右，从上到下顺序列出来。</textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="solve()">🚀 求解</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <div class="notation-hint">
      <b>标准魔方记号：</b>
      <b>U</b>=顶面(Up) <b>D</b>=底面(Down) <b>F</b>=正面(Front) <b>B</b>=背面(Back) <b>L</b>=左面(Left) <b>R</b>=右面(Right)<br>
      顺时针=面对该面看时的顺时针方向。例如 <b>U</b> 表示从上方俯视顶面时顺时针旋转90°，<b>R</b> 表示从右侧看右面时顺时针旋转90°。
    </div>
  </div>

  <div class="output-grid">
    <div class="panel">
      <h2>🎯 答案</h2>
      <div id="answer-box">等待输入...</div>
    </div>
    <div class="panel">
      <h2>📖 每步旋转详解</h2>
      <div id="steps-box">等待输入...</div>
    </div>
  </div>

  <div class="anim-section" id="anim-section" style="display:none;">
    <h2>🎬 逐步动画演示</h2>
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="anim-controls">
      <button class="btn btn-secondary" onclick="animFirst()">⏮ 初始</button>
      <button class="btn btn-secondary" onclick="animPrev()">◀ 上一步</button>
      <button class="btn btn-primary" onclick="animNext()">下一步 ▶</button>
      <button class="btn btn-secondary" onclick="animLast()">末尾 ⏭</button>
      <button class="btn btn-secondary" id="autoPlayBtn" onclick="animAutoPlay()">▶ 自动播放</button>
      <span class="step-indicator" id="step-indicator">第 0 步 / 共 0 步</span>
    </div>
    <div id="anim-move-desc" style="font-size:15px; margin-bottom:16px; color:#ffd740; min-height:24px;"></div>

    <div class="anim-display">
      <!-- 3D Cube on left -->
      <div class="cube3d-wrapper">
        <div class="face-label">3D 视图</div>
        <div class="cube3d-container">
          <div class="cube3d" id="cube3d"></div>
        </div>
        <div class="rotation-indicator" id="rotation-indicator"></div>
      </div>
      <!-- 2D Net on right -->
      <div style="flex-shrink:0;">
        <div style="font-size:14px; font-weight:600; color:#aaa; margin-bottom:10px; text-align:center;">2D 展开图</div>
        <div class="cube-display">
          <div class="cube-net" id="cube-net"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== Cube Simulator ====================
// Standard Rubik's cube notation (ruwix.com/Singmaster):
// Each letter = clockwise 90° when looking directly at that face.
// U = top CW from above, D = bottom CW from below,
// F = front CW from front, B = back CW from behind,
// R = right CW from right, L = left CW from left.

const FACE_NAMES = ['U', 'D', 'F', 'B', 'L', 'R'];

function createCube(colors) {
  const cube = {};
  for (const f of FACE_NAMES) cube[f] = Array(9).fill(colors[f]);
  return cube;
}

function cloneCube(cube) {
  const c = {};
  for (const f of FACE_NAMES) c[f] = [...cube[f]];
  return c;
}

// Face index layout (looking directly at the face):
// 0 1 2
// 3 4 5
// 6 7 8
function rotateFaceCW(face) {
  return [face[6], face[3], face[0], face[7], face[4], face[1], face[8], face[5], face[2]];
}
function rotateFaceCCW(face) {
  return [face[2], face[5], face[8], face[1], face[4], face[7], face[0], face[3], face[6]];
}

function applyMove(cube, move) {
  let c = cloneCube(cube);
  switch (move) {
    // U CW (from above): F top→R top→B top→L top→F top
    case 'U':
      c.U = rotateFaceCW(c.U);
      { const t = [c.F[0],c.F[1],c.F[2]];
        [c.F[0],c.F[1],c.F[2]] = [c.L[0],c.L[1],c.L[2]];
        [c.L[0],c.L[1],c.L[2]] = [c.B[0],c.B[1],c.B[2]];
        [c.B[0],c.B[1],c.B[2]] = [c.R[0],c.R[1],c.R[2]];
        [c.R[0],c.R[1],c.R[2]] = t;
      } break;
    case "U'":
      c.U = rotateFaceCCW(c.U);
      { const t = [c.F[0],c.F[1],c.F[2]];
        [c.F[0],c.F[1],c.F[2]] = [c.R[0],c.R[1],c.R[2]];
        [c.R[0],c.R[1],c.R[2]] = [c.B[0],c.B[1],c.B[2]];
        [c.B[0],c.B[1],c.B[2]] = [c.L[0],c.L[1],c.L[2]];
        [c.L[0],c.L[1],c.L[2]] = t;
      } break;
    case 'U2': return applyMove(applyMove(c, 'U'), 'U');

    // D CW (from below): F bot→L bot→B bot→R bot→F bot
    // D face is indexed from above, so CW from below = CCW in grid coords
    case 'D':
      c.D = rotateFaceCCW(c.D);
      { const t = [c.F[6],c.F[7],c.F[8]];
        [c.F[6],c.F[7],c.F[8]] = [c.R[6],c.R[7],c.R[8]];
        [c.R[6],c.R[7],c.R[8]] = [c.B[6],c.B[7],c.B[8]];
        [c.B[6],c.B[7],c.B[8]] = [c.L[6],c.L[7],c.L[8]];
        [c.L[6],c.L[7],c.L[8]] = t;
      } break;
    case "D'":
      c.D = rotateFaceCW(c.D);
      { const t = [c.F[6],c.F[7],c.F[8]];
        [c.F[6],c.F[7],c.F[8]] = [c.L[6],c.L[7],c.L[8]];
        [c.L[6],c.L[7],c.L[8]] = [c.B[6],c.B[7],c.B[8]];
        [c.B[6],c.B[7],c.B[8]] = [c.R[6],c.R[7],c.R[8]];
        [c.R[6],c.R[7],c.R[8]] = t;
      } break;
    case 'D2': return applyMove(applyMove(c, 'D'), 'D');

    // F CW (from front): U bot→R leftcol, R leftcol→D top(rev), D top→L rightcol, L rightcol→U bot(rev)
    case 'F':
      c.F = rotateFaceCW(c.F);
      { const s = [c.U[6],c.U[7],c.U[8]];
        [c.U[6],c.U[7],c.U[8]] = [c.L[8],c.L[5],c.L[2]];
        [c.L[2],c.L[5],c.L[8]] = [c.D[0],c.D[1],c.D[2]];
        [c.D[0],c.D[1],c.D[2]] = [c.R[6],c.R[3],c.R[0]];
        [c.R[0],c.R[3],c.R[6]] = s;
      } break;
    case "F'":
      c.F = rotateFaceCCW(c.F);
      { const s = [c.U[6],c.U[7],c.U[8]];
        [c.U[6],c.U[7],c.U[8]] = [c.R[0],c.R[3],c.R[6]];
        [c.R[0],c.R[3],c.R[6]] = [c.D[2],c.D[1],c.D[0]];
        [c.D[0],c.D[1],c.D[2]] = [c.L[2],c.L[5],c.L[8]];
        [c.L[2],c.L[5],c.L[8]] = [s[2],s[1],s[0]];
      } break;
    case 'F2': return applyMove(applyMove(c, 'F'), 'F');

    // B CW (from behind): U top→R rightcol, R rightcol→D bot(rev), D bot→L leftcol, L leftcol→U top(rev)
    case 'B':
      c.B = rotateFaceCW(c.B);
      { const s = [c.U[0],c.U[1],c.U[2]];
        [c.U[0],c.U[1],c.U[2]] = [c.R[2],c.R[5],c.R[8]];
        [c.R[2],c.R[5],c.R[8]] = [c.D[8],c.D[7],c.D[6]];
        [c.D[6],c.D[7],c.D[8]] = [c.L[0],c.L[3],c.L[6]];
        [c.L[0],c.L[3],c.L[6]] = [s[2],s[1],s[0]];
      } break;
    case "B'":
      c.B = rotateFaceCCW(c.B);
      { const s = [c.U[0],c.U[1],c.U[2]];
        [c.U[0],c.U[1],c.U[2]] = [c.L[6],c.L[3],c.L[0]];
        [c.L[0],c.L[3],c.L[6]] = [c.D[6],c.D[7],c.D[8]];
        [c.D[6],c.D[7],c.D[8]] = [c.R[8],c.R[5],c.R[2]];
        [c.R[2],c.R[5],c.R[8]] = s;
      } break;
    case 'B2': return applyMove(applyMove(c, 'B'), 'B');

    // R CW (from right): F rightcol→U rightcol→B leftcol(rev)→D rightcol→F rightcol
    case 'R':
      c.R = rotateFaceCW(c.R);
      { const s = [c.U[2],c.U[5],c.U[8]];
        [c.U[2],c.U[5],c.U[8]] = [c.F[2],c.F[5],c.F[8]];
        [c.F[2],c.F[5],c.F[8]] = [c.D[2],c.D[5],c.D[8]];
        [c.D[2],c.D[5],c.D[8]] = [c.B[6],c.B[3],c.B[0]];
        [c.B[0],c.B[3],c.B[6]] = [s[2],s[1],s[0]];
      } break;
    case "R'":
      c.R = rotateFaceCCW(c.R);
      { const s = [c.U[2],c.U[5],c.U[8]];
        [c.U[2],c.U[5],c.U[8]] = [c.B[6],c.B[3],c.B[0]];
        [c.B[0],c.B[3],c.B[6]] = [c.D[8],c.D[5],c.D[2]];
        [c.D[2],c.D[5],c.D[8]] = [c.F[2],c.F[5],c.F[8]];
        [c.F[2],c.F[5],c.F[8]] = s;
      } break;
    case 'R2': return applyMove(applyMove(c, 'R'), 'R');

    // L CW (from left): F leftcol→D leftcol→B rightcol(rev)→U leftcol→F leftcol
    case 'L':
      c.L = rotateFaceCW(c.L);
      { const s = [c.U[0],c.U[3],c.U[6]];
        [c.U[0],c.U[3],c.U[6]] = [c.B[8],c.B[5],c.B[2]];
        [c.B[2],c.B[5],c.B[8]] = [c.D[6],c.D[3],c.D[0]];
        [c.D[0],c.D[3],c.D[6]] = [c.F[0],c.F[3],c.F[6]];
        [c.F[0],c.F[3],c.F[6]] = s;
      } break;
    case "L'":
      c.L = rotateFaceCCW(c.L);
      { const s = [c.U[0],c.U[3],c.U[6]];
        [c.U[0],c.U[3],c.U[6]] = [c.F[0],c.F[3],c.F[6]];
        [c.F[0],c.F[3],c.F[6]] = [c.D[0],c.D[3],c.D[6]];
        [c.D[0],c.D[3],c.D[6]] = [c.B[8],c.B[5],c.B[2]];
        [c.B[2],c.B[5],c.B[8]] = [s[2],s[1],s[0]];
      } break;
    case 'L2': return applyMove(applyMove(c, 'L'), 'L');
  }
  return c;
}

// ==================== Query Parser ====================

const COLOR_MAP_ZH = {
  '蓝': 'blue', '红': 'red', '黄': 'yellow',
  '绿': 'green', '橙': 'orange', '白': 'white',
  '蓝色': 'blue', '红色': 'red', '黄色': 'yellow',
  '绿色': 'green', '橙色': 'orange', '白色': 'white',
};

const COLOR_DISPLAY = {
  blue: '蓝', red: '红', yellow: '黄',
  green: '绿', orange: '橙', white: '白',
};

const COLOR_CSS = {
  blue: 'c-blue', red: 'c-red', yellow: 'c-yellow',
  green: 'c-green', orange: 'c-orange', white: 'c-white',
};

const MOVE_DESC = {
  'U':  'U — 顶面顺时针90°（从上方俯视）',
  "U'": "U' — 顶面逆时针90°",
  'U2': 'U2 — 顶面180°',
  'D':  'D — 底面顺时针90°（从下方仰视）',
  "D'": "D' — 底面逆时针90°",
  'D2': 'D2 — 底面180°',
  'F':  'F — 正面顺时针90°（面对正面看）',
  "F'": "F' — 正面逆时针90°",
  'F2': 'F2 — 正面180°',
  'B':  'B — 背面顺时针90°（面对背面看）',
  "B'": "B' — 背面逆时针90°",
  'B2': 'B2 — 背面180°',
  'R':  'R — 右面顺时针90°（面对右面看）',
  "R'": "R' — 右面逆时针90°",
  'R2': 'R2 — 右面180°',
  'L':  'L — 左面顺时针90°（面对左面看）',
  "L'": "L' — 左面逆时针90°",
  'L2': 'L2 — 左面180°',
};

const FACE_FULL_ZH = { U: '顶面(U)', D: '底面(D)', F: '正面(F)', B: '背面(B)', L: '左面(L)', R: '右面(R)' };

function parseQuery(text) {
  const faceColors = {};
  const colorPatterns = [
    /(?:正面|前面|前)\s*F?\s*[是为：:]\s*(\S)/g,
    /(?:背面|后面|后)\s*B?\s*[是为：:]\s*(\S)/g,
    /(?:左面|左)\s*L?\s*[是为：:]\s*(\S)/g,
    /(?:右面|右)\s*R?\s*[是为：:]\s*(\S)/g,
    /(?:顶面|上面|顶|上)\s*U?\s*[是为：:]\s*(\S)/g,
    /(?:底面|下面|底|下)\s*D?\s*[是为：:]\s*(\S)/g,
  ];
  const faceLetter = ['F', 'B', 'L', 'R', 'U', 'D'];
  for (let i = 0; i < colorPatterns.length; i++) {
    const m = colorPatterns[i].exec(text);
    if (m) {
      const colorChar = m[1].replace(/[色，。、,\.]/g, '');
      if (COLOR_MAP_ZH[colorChar]) faceColors[faceLetter[i]] = COLOR_MAP_ZH[colorChar];
    }
  }
  const directPattern = /([UDLRFB])\s*[面]?\s*[是为：:]\s*([\u4e00-\u9fff]+)/g;
  let dm;
  while ((dm = directPattern.exec(text)) !== null) {
    const c = dm[2].replace(/[色，。、,\.]/g, '');
    if (COLOR_MAP_ZH[c] && !faceColors[dm[1]]) faceColors[dm[1]] = COLOR_MAP_ZH[c];
  }

  let moves = [];
  const moveSection = text.match(/(?:步骤|操作|旋转|公式)[^：:]*[：:]\s*([^\n。]+)/);
  if (moveSection) {
    const moveStr = moveSection[1];
    // Support various prime/apostrophe/counter-clockwise characters:
    // ' ' ʼ ′ ` ´ * - (apostrophes, prime, backtick, acute, asterisk, dash)
    const moveTokens = moveStr.match(/[UDLRFB][2''\u2019\u2032ʼ`´*\-]?/g);
    if (moveTokens) moves = moveTokens;
  }
  if (moves.length === 0) {
    const allMoves = text.match(/[UDLRFB][2''\u2019\u2032ʼ`´*\-]?/g);
    if (allMoves && allMoves.length > 0) {
      moves = allMoves.filter(m => {
        const idx = text.indexOf(m);
        const after = text.substring(idx + m.length, idx + m.length + 2);
        return !/^[是为面]/.test(after);
      });
    }
  }
  // Normalize all prime/CCW variants to standard '
  moves = moves.map(m => m.replace(/[''ʼ\u2019\u2032`´*\-]/g, "'"));

  let queryFace = 'F';
  const queryMatch = text.match(/(?:魔方|现在)\s*([UDLRFB])\s*面/);
  if (queryMatch) queryFace = queryMatch[1];
  const queryMatch2 = text.match(/(?:魔方|现在)\s*(正面|背面|左面|右面|顶面|底面|上面|下面|前面|后面)/);
  if (queryMatch2) {
    const FACE_ZH = { '正面':'F','前面':'F','背面':'B','后面':'B','左面':'L','右面':'R','顶面':'U','上面':'U','底面':'D','下面':'D' };
    if (FACE_ZH[queryMatch2[1]]) queryFace = FACE_ZH[queryMatch2[1]];
  }
  return { faceColors, moves, queryFace };
}

// ==================== Describe Changes ====================

function describeChange(prevCube, newCube, move, stepNum) {
  const desc = MOVE_DESC[move] || move;
  let lines = `【第${stepNum}步】${desc}\n`;
  for (const f of FACE_NAMES) {
    const prev = prevCube[f];
    const curr = newCube[f];
    if (prev.some((v, i) => v !== curr[i])) {
      const grid = `${curr.slice(0,3).map(c=>COLOR_DISPLAY[c]).join('')} | ${curr.slice(3,6).map(c=>COLOR_DISPLAY[c]).join('')} | ${curr.slice(6,9).map(c=>COLOR_DISPLAY[c]).join('')}`;
      lines += `  ${FACE_FULL_ZH[f]}：${grid}\n`;
    }
  }
  return lines;
}

// ==================== Main Solve ====================

let solveResult = null;

function solve() {
  const text = document.getElementById('queryInput').value.trim();
  if (!text) return;

  const { faceColors, moves, queryFace } = parseQuery(text);

  if (Object.keys(faceColors).length < 6) {
    const defaults = { U: 'white', D: 'yellow', F: 'green', B: 'blue', L: 'orange', R: 'red' };
    for (const f of FACE_NAMES) {
      if (!faceColors[f]) faceColors[f] = defaults[f];
    }
  }

  if (moves.length === 0) {
    document.getElementById('answer-box').textContent = '⚠️ 未能识别出旋转步骤，请检查输入格式。';
    return;
  }

  let cube = createCube(faceColors);
  const snapshots = [cloneCube(cube)];
  const stepDescs = [];

  for (let i = 0; i < moves.length; i++) {
    const prev = cloneCube(cube);
    cube = applyMove(cube, moves[i]);
    snapshots.push(cloneCube(cube));
    stepDescs.push(describeChange(prev, cube, moves[i], i + 1));
  }

  const finalFace = cube[queryFace];
  const ac = finalFace.map(c => COLOR_DISPLAY[c] || c);
  let answerText = `${FACE_FULL_ZH[queryFace]} 的 9 个方块颜色（从左到右，从上到下）：\n\n`;
  answerText += `  ${ac[0]}  ${ac[1]}  ${ac[2]}\n`;
  answerText += `  ${ac[3]}  ${ac[4]}  ${ac[5]}\n`;
  answerText += `  ${ac[6]}  ${ac[7]}  ${ac[8]}\n\n`;
  answerText += `即：${ac.join('、')}`;

  document.getElementById('answer-box').textContent = answerText;

  let stepsHtml = '';
  for (const desc of stepDescs) {
    stepsHtml += `<div class="step-item">${desc.replace(/\n/g, '<br>')}</div>`;
  }
  document.getElementById('steps-box').innerHTML = stepsHtml;

  solveResult = { snapshots, moves, queryFace, faceColors };
  currentStep = 0;
  document.getElementById('anim-section').style.display = 'block';
  updateAnimDisplay();
}

// ==================== Animation ====================

let currentStep = 0;
let autoPlayTimer = null;

function updateAnimDisplay() {
  if (!solveResult) return;
  const { snapshots, moves, queryFace } = solveResult;
  const total = moves.length;
  const cube = snapshots[currentStep];

  document.getElementById('step-indicator').textContent =
    currentStep === 0 ? `初始状态 / 共 ${total} 步` : `第 ${currentStep} 步 / 共 ${total} 步`;
  document.getElementById('progress-fill').style.width = `${(currentStep / total) * 100}%`;

  const descEl = document.getElementById('anim-move-desc');
  // Determine current move (for highlighting)
  const currentMove = currentStep > 0 ? moves[currentStep - 1] : null;
  const activeFace = currentMove ? currentMove[0] : null; // First char = face letter

  if (currentStep === 0) {
    descEl.textContent = '📌 初始状态 — 各面颜色均匀';
  } else {
    descEl.textContent = `🔄 ${MOVE_DESC[currentMove] || currentMove}`;
  }

  render2DNet(cube, queryFace, activeFace);
  render3DCube(cube, activeFace);
  updateRotationIndicator(currentMove);
}

function render2DNet(cube, highlightFace, activeFace) {
  const net = document.getElementById('cube-net');
  net.innerHTML = '';

  // Standard unfolded layout:
  //       U
  //   L   F   R   B
  //       D
  const layout = [
    [null, 'U', null, null],
    ['L', 'F', 'R', 'B'],
    [null, 'D', null, null],
  ];

  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 4; col++) {
      const face = layout[row][col];
      if (!face) {
        const empty = document.createElement('div');
        empty.className = 'empty-cell';
        net.appendChild(empty);
      } else {
        const wrapper = document.createElement('div');
        wrapper.className = 'face-wrapper';
        // Highlight the face that just rotated
        if (face === activeFace) wrapper.classList.add('face-2d-active');

        const label = document.createElement('div');
        label.className = 'face-label';
        label.innerHTML = `<span class="face-letter">${face}</span> ${FACE_FULL_ZH[face]}`;
        wrapper.appendChild(label);

        const block = document.createElement('div');
        block.className = 'face-block';
        for (let i = 0; i < 9; i++) {
          const cell = document.createElement('div');
          cell.className = `cell ${COLOR_CSS[cube[face][i]] || ''}`;
          if (face === highlightFace) cell.classList.add('highlight');
          block.appendChild(cell);
        }
        wrapper.appendChild(block);
        net.appendChild(wrapper);
      }
    }
  }
}

function render3DCube(cube, activeFace) {
  const container = document.getElementById('cube3d');
  container.innerHTML = '';

  const faces3d = [
    { name: 'F', cls: 'face3d-F' },
    { name: 'B', cls: 'face3d-B' },
    { name: 'U', cls: 'face3d-U' },
    { name: 'D', cls: 'face3d-D' },
    { name: 'R', cls: 'face3d-R' },
    { name: 'L', cls: 'face3d-L' },
  ];

  for (const f of faces3d) {
    const faceEl = document.createElement('div');
    faceEl.className = `face3d ${f.cls}`;
    if (f.name === activeFace) faceEl.classList.add('face-active');
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = `cell3d ${COLOR_CSS[cube[f.name][i]] || ''}`;
      faceEl.appendChild(cell);
    }
    // Add face letter label
    const labelEl = document.createElement('div');
    labelEl.className = `face3d-label ${f.cls}`;
    labelEl.textContent = f.name;
    container.appendChild(faceEl);
    container.appendChild(labelEl);
  }
}

// Rotation direction indicator with arrow
function updateRotationIndicator(move) {
  const el = document.getElementById('rotation-indicator');
  if (!move) {
    el.innerHTML = '';
    return;
  }
  const face = move[0];
  const isPrime = move.includes("'");
  const isDouble = move.includes("2");

  let arrowSymbol, dirText;
  if (isDouble) {
    arrowSymbol = '🔄';
    dirText = `${FACE_FULL_ZH[face]} 旋转180°`;
  } else if (isPrime) {
    arrowSymbol = '↺';
    dirText = `${FACE_FULL_ZH[face]} 逆时针90°`;
  } else {
    arrowSymbol = '↻';
    dirText = `${FACE_FULL_ZH[face]} 顺时针90°`;
  }

  el.innerHTML = `<div class="arrow-symbol">${arrowSymbol}</div><div class="arrow-text">${dirText}</div>`;
}

function animNext() {
  if (!solveResult || currentStep >= solveResult.moves.length) return;
  currentStep++;
  updateAnimDisplay();
}
function animPrev() {
  if (!solveResult || currentStep <= 0) return;
  currentStep--;
  updateAnimDisplay();
}
function animFirst() {
  if (!solveResult) return;
  currentStep = 0;
  updateAnimDisplay();
}
function animLast() {
  if (!solveResult) return;
  currentStep = solveResult.moves.length;
  updateAnimDisplay();
}
function animAutoPlay() {
  if (!solveResult) return;
  const btn = document.getElementById('autoPlayBtn');
  if (autoPlayTimer) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    btn.textContent = '▶ 自动播放';
    return;
  }
  if (currentStep >= solveResult.moves.length) { currentStep = 0; updateAnimDisplay(); }
  btn.textContent = '⏸ 暂停';
  autoPlayTimer = setInterval(() => {
    if (currentStep >= solveResult.moves.length) {
      clearInterval(autoPlayTimer);
      autoPlayTimer = null;
      btn.textContent = '▶ 自动播放';
      return;
    }
    currentStep++;
    updateAnimDisplay();
  }, 1200);
}

function clearAll() {
  document.getElementById('queryInput').value = '';
  document.getElementById('answer-box').textContent = '等待输入...';
  document.getElementById('steps-box').textContent = '等待输入...';
  document.getElementById('anim-section').style.display = 'none';
  solveResult = null;
  currentStep = 0;
  if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
}
</script>
